name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # Pin the OS because font rendering is part of the committed screenshot
    # baselines. Moving to a new runner image should be an explicit review.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Verify dependency signatures
        run: npm audit signatures

      - name: Build site
        run: npm run build

      - name: Install responsive-test browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Test responsive layouts
        run: npm run test:responsive

      - name: Upload responsive-test report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: responsive-test-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
