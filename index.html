<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f47c67" />
    <meta name="description" content="Mobile wallet designed for private payments on Aztec." />
    <meta property="og:title" content="Talents" />
    <meta property="og:description" content="Mobile wallet designed for private payments on Aztec." />
    <meta property="og:image" content="/brand/talents-app-icon-1024.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/brand/talents-app-icon-1024.png" />
    <link rel="icon" href="/brand/talents-app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/brand/talents-app-icon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Talents</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landing">
      <div class="backdrop-grid" aria-hidden="true"></div>
      <div class="backdrop-orbit backdrop-orbit--one" aria-hidden="true"></div>
      <div class="backdrop-orbit backdrop-orbit--two" aria-hidden="true"></div>

      <section class="hero">
        <div class="hero-copy">
          <h1>
            <span>Talents.</span>
            <span>Private money</span>
            <span>made simple.</span>
          </h1>
          <p class="product-lede">Mobile wallet designed for private payments on Aztec.</p>

          <div class="signup">
            <p class="signup-lede">Subscribe to hear about its release:</p>
            <div class="substack-embed-shell">
              <iframe
                class="substack-embed"
                src="https://talentswallet.substack.com/embed"
                title="Subscribe to Talents Wallet updates on Substack"
                scrolling="no"
                loading="eager"
                referrerpolicy="no-referrer"
                sandbox="allow-forms allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"
              ></iframe>
            </div>
          </div>
        </div>

        <div class="product-visual" role="img" aria-label="Preview of the Talents mobile wallet">
          <div class="phone-frame" aria-hidden="true">
            <div class="phone-screen">
              <div class="iphone-status-bar">
                <span class="iphone-status-time">9:41</span>
                <span class="iphone-dynamic-island"></span>
                <span class="iphone-status-icons">
                  <svg class="iphone-cellular" viewBox="0 0 19 12" aria-hidden="true">
                    <rect x="1" y="8" width="3" height="4" rx="1" />
                    <rect x="5.7" y="6" width="3" height="6" rx="1" />
                    <rect x="10.3" y="3.5" width="3" height="8.5" rx="1" />
                    <rect x="15" y="1" width="3" height="11" rx="1" />
                  </svg>
                  <svg class="iphone-wifi" viewBox="0 0 17 13" aria-hidden="true">
                    <path d="M1.2 4.4C5.3.8 11.7.8 15.8 4.4" />
                    <path d="M4 7.4c2.5-2 6.5-2 9 0" />
                    <circle cx="8.5" cy="10.6" r="1.25" />
                  </svg>
                  <svg class="iphone-battery" viewBox="0 0 27 13" aria-hidden="true">
                    <rect class="iphone-battery-case" x=".75" y=".75" width="22" height="11.5" rx="3.25" />
                    <path class="iphone-battery-tip" d="M24.25 4.15v4.7A2.45 2.45 0 0 0 26 6.5a2.45 2.45 0 0 0-1.75-2.35Z" />
                    <rect class="iphone-battery-level" x="2.5" y="2.5" width="18.1" height="8" rx="1.75" />
                  </svg>
                </span>
              </div>
              <div class="phone-screenshot-viewport">
                <img
                  class="phone-screenshot"
                  src="/mockups/talents-home.png"
                  alt=""
                  width="404"
                  height="840"
                />
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a
        class="social-link"
        href="https://x.com/TalentsWallet"
        target="_blank"
        rel="noopener"
        aria-label="Talents on X"
      >
        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z" />
        </svg>
      </a>
      <a
        class="social-link"
        href="https://github.com/Talents-Wallet"
        target="_blank"
        rel="noopener"
        aria-label="Talents on GitHub"
      >
        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
        </svg>
      </a>
    </footer>

  </body>
</html>
